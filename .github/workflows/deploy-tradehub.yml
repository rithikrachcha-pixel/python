name: Deploy TradeHub to Netlify

on:
  push:
    branches: [claude/build-web-app-pc3Au, main]
    paths: [tradehub-deploy/**, tradehub.html]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and Deploy
        run: |
          set -e
          SITE_ID="4cf59dab-5980-4669-995e-074bd3247148"
          TOKEN="${NETLIFY_AUTH_TOKEN}"

          echo "=== TOKEN INFO ==="
          echo "Token length: ${#TOKEN}"
          echo "Token prefix: ${TOKEN:0:4}"

          echo "=== TEST AUTH ==="
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.netlify.com/api/v1/user)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY" | head -c 500

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Auth failed! Token is invalid or empty."
            exit 1
          fi

          echo "=== DEPLOYING ==="
          pip3 install -q requests
          python3 -c "
          import requests, hashlib, os, time, json

          token = os.environ['NETLIFY_AUTH_TOKEN']
          site_id = '4cf59dab-5980-4669-995e-074bd3247148'
          headers = {'Authorization': f'Bearer {token}'}

          with open('tradehub-deploy/index.html', 'rb') as f:
              content = f.read()
          sha1 = hashlib.sha1(content).hexdigest()
          print(f'File SHA1: {sha1[:8]}..., size: {len(content)} bytes')

          r = requests.post(
              f'https://api.netlify.com/api/v1/sites/{site_id}/deploys',
              headers={**headers, 'Content-Type': 'application/json'},
              json={'files': {'/index.html': sha1}}
          )
          print(f'Deploy create: HTTP {r.status_code}')
          if not r.ok:
              print(r.text[:500])
              exit(1)

          deploy = r.json()
          deploy_id = deploy['id']
          required = deploy.get('required', [])
          print(f'Deploy ID: {deploy_id}, required: {len(required)} files')

          if sha1 in required:
              r2 = requests.put(
                  f'https://api.netlify.com/api/v1/deploys/{deploy_id}/files/index.html',
                  headers={**headers, 'Content-Type': 'application/octet-stream'},
                  data=content
              )
              print(f'Upload: HTTP {r2.status_code}')

          for _ in range(20):
              r3 = requests.get(f'https://api.netlify.com/api/v1/deploys/{deploy_id}', headers=headers)
              d = r3.json()
              state = d.get('state')
              print(f'State: {state}')
              if state in ('ready', 'current'):
                  print(f'Live at: {d.get(\"ssl_url\") or d.get(\"url\")}')
                  break
              if state == 'error':
                  print(f'Error: {d.get(\"error_message\")}')
                  exit(1)
              time.sleep(3)
          "
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
