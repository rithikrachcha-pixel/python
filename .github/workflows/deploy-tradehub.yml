name: Deploy TradeHub to Netlify

on:
  push:
    branches: [claude/build-web-app-pc3Au, main]
    paths: [tradehub-deploy/**, tradehub.html]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and Deploy
        id: deploy
        run: |
          set -e
          SITE_ID="4cf59dab-5980-4669-995e-074bd3247148"
          TOKEN="${NETLIFY_AUTH_TOKEN}"

          {
            echo "=== TOKEN INFO ==="
            echo "Token length: ${#TOKEN}"
            echo "Token prefix: ${TOKEN:0:4}"
            echo "Token suffix: ${TOKEN: -4}"

            echo "=== TEST AUTH ==="
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -H "Authorization: Bearer ${TOKEN}" \
              https://api.netlify.com/api/v1/user 2>&1)
            HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
            BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
            echo "HTTP Status: $HTTP_STATUS"
            echo "Body: $(echo "$BODY" | cut -c1-300)"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "AUTH FAILED"
              exit 1
            fi

            echo "=== DEPLOYING ==="
            pip3 install -q requests
            python3 << 'PYEOF'
          import requests, hashlib, os, time

          token = os.environ['NETLIFY_AUTH_TOKEN']
          site_id = '4cf59dab-5980-4669-995e-074bd3247148'
          headers = {'Authorization': f'Bearer {token}'}

          with open('tradehub-deploy/index.html', 'rb') as f:
              content = f.read()
          sha1 = hashlib.sha1(content).hexdigest()
          print(f'File: {len(content)} bytes, sha1={sha1[:8]}')

          r = requests.post(
              f'https://api.netlify.com/api/v1/sites/{site_id}/deploys',
              headers={**headers, 'Content-Type': 'application/json'},
              json={'files': {'/index.html': sha1}}
          )
          print(f'Create deploy: {r.status_code}')
          if not r.ok:
              print(r.text[:500])
              raise SystemExit(1)

          d = r.json()
          deploy_id, required = d['id'], d.get('required', [])
          print(f'Deploy {deploy_id}, required={required}')

          if sha1 in required:
              r2 = requests.put(
                  f'https://api.netlify.com/api/v1/deploys/{deploy_id}/files/index.html',
                  headers={**headers, 'Content-Type': 'application/octet-stream'},
                  data=content
              )
              print(f'Upload: {r2.status_code}')

          for _ in range(20):
              d2 = requests.get(f'https://api.netlify.com/api/v1/deploys/{deploy_id}', headers=headers).json()
              state = d2.get('state')
              print(f'State: {state}')
              if state in ('ready', 'current'):
                  print(f'URL: {d2.get("ssl_url") or d2.get("url")}')
                  break
              if state == 'error':
                  raise SystemExit(f'Deploy error: {d2.get("error_message")}')
              time.sleep(3)
          PYEOF
          } 2>&1 | tee /tmp/deploy-output.txt
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: /tmp/deploy-output.txt
          retention-days: 1
