name: Deploy TradeHub to Netlify

on:
  push:
    branches: [claude/build-web-app-pc3Au, main]
    paths: [tradehub-deploy/**, tradehub.html]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test auth and deploy
        run: |
          set -euo pipefail
          TOKEN="${NETLIFY_AUTH_TOKEN}"
          SITE_ID="4cf59dab-5980-4669-995e-074bd3247148"

          echo "## Deploy Output" >> "$GITHUB_STEP_SUMMARY"
          echo "Token length: ${#TOKEN}" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Token prefix: ${TOKEN:0:4}" | tee -a "$GITHUB_STEP_SUMMARY"

          echo "### Auth test" >> "$GITHUB_STEP_SUMMARY"
          STATUS=$(curl -s -o /tmp/auth.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.netlify.com/api/v1/user)
          echo "HTTP $STATUS" | tee -a "$GITHUB_STEP_SUMMARY"
          cat /tmp/auth.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('email:', d.get('email','?'))" \
            2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" != "200" ]; then
            echo "Auth FAILED" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "### Deploy" >> "$GITHUB_STEP_SUMMARY"
          pip3 install -q requests
          python3 - << 'PYEOF' 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          import requests, hashlib, os, time, sys

          token = os.environ['NETLIFY_AUTH_TOKEN']
          site_id = '4cf59dab-5980-4669-995e-074bd3247148'
          headers = {'Authorization': f'Bearer {token}'}

          with open('tradehub-deploy/index.html', 'rb') as f:
              content = f.read()
          sha1 = hashlib.sha1(content).hexdigest()
          print(f'File: {len(content)} bytes, sha1={sha1[:8]}')

          r = requests.post(
              f'https://api.netlify.com/api/v1/sites/{site_id}/deploys',
              headers={**headers, 'Content-Type': 'application/json'},
              json={'files': {'/index.html': sha1}}
          )
          print(f'Create deploy: HTTP {r.status_code}')
          if not r.ok:
              print('ERROR:', r.text[:500])
              sys.exit(1)

          d = r.json()
          deploy_id = d['id']
          required = d.get('required', [])
          print(f'Deploy ID: {deploy_id}')
          print(f'Required files: {required}')

          if sha1 in required:
              r2 = requests.put(
                  f'https://api.netlify.com/api/v1/deploys/{deploy_id}/files/index.html',
                  headers={**headers, 'Content-Type': 'application/octet-stream'},
                  data=content
              )
              print(f'Upload: HTTP {r2.status_code}')
              if not r2.ok:
                  print('Upload error:', r2.text[:300])
                  sys.exit(1)

          for i in range(30):
              d2 = requests.get(f'https://api.netlify.com/api/v1/deploys/{deploy_id}', headers=headers).json()
              state = d2.get('state')
              print(f'Poll {i+1}: state={state}')
              if state in ('ready', 'current'):
                  print(f'LIVE: {d2.get("ssl_url") or d2.get("url")}')
                  sys.exit(0)
              if state == 'error':
                  print(f'Deploy error: {d2.get("error_message")}')
                  sys.exit(1)
              time.sleep(3)
          print('Timed out waiting for deploy')
          sys.exit(1)
          PYEOF
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
